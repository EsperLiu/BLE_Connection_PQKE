# Minimal BLE central/client for testing connection-PQKE PK retrieval
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="PQKE-GW"

# Larger ATT MTU / buffers so PK indications can arrive in large chunks.
# If these are too large for your local Zephyr config, reduce gradually.
CONFIG_BT_L2CAP_TX_MTU=498
CONFIG_BT_BUF_ACL_RX_SIZE=502
CONFIG_BT_BUF_ACL_TX_SIZE=502
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Allows bt_gatt_subscribe() to find CCC when ccc_handle is 0.
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192